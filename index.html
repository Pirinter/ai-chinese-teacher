<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chinese Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION ---
        // Paste your FULL API Key between the quotes below
        const GEMINI_API_KEY = "AIzaSyDUytz_ELCjBRM2oWBkCwOX5MlvzTp-3ec"; 

        const App = () => {
            const [words, setWords] = useState(() => {
                const saved = localStorage.getItem('my_chinese_vocab');
                return saved ? JSON.parse(saved) : [
                    { id: 1, en: 'Apple', zh: '苹果', py: 'píng guǒ', img: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6bcd6?w=200' },
                    { id: 2, en: 'Cat', zh: '猫', py: 'māo', img: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=200' }
                ];
            });

            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            // Save to local storage automatically
            useEffect(() => {
                localStorage.setItem('my_chinese_vocab', JSON.stringify(words));
            }, [words]);

            const handleAddWord = async () => {
                if (!input.trim()) return;
                if (!GEMINI_API_KEY) {
                    setError("Please enter your API Key in the code first!");
                    return;
                }

                setLoading(true);
                setError(null);

                try {
                    // Changed model to gemini-1.5-flash-8b for better endpoint stability
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `Translate the English word "${input}" into Chinese. 
                                           Return exactly this JSON format: {"zh": "Chinese Characters", "py": "pinyin"}`
                                }]
                            }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.1 
                            }
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        // If 404 persists, it likely means the API Key does not have the "Generative Language API" enabled in Google Cloud Console
                        throw new Error(errData.error?.message || `Error ${response.status}: Model not found.`);
                    }

                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    
                    const newEntry = {
                        id: Date.now(),
                        en: input,
                        zh: result.zh,
                        py: result.py,
                        img: `https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200&q=80&sig=${Math.random()}`
                    };

                    setWords([newEntry, ...words]);
                    setInput('');
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const playAudio = (text) => {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-CN';
                window.speechSynthesis.speak(msg);
            };

            const deleteWord = (id) => {
                setWords(words.filter(w => w.id !== id));
            };

            return (
                <div className="max-w-2xl mx-auto p-6">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl font-bold text-slate-800 mb-2">🇨🇳 My Chinese Lab</h1>
                        <p className="text-slate-500 text-lg">Add words to build your local dictionary</p>
                    </header>

                    <div className="bg-white p-4 rounded-2xl shadow-xl border border-slate-100 mb-8">
                        <div className="flex gap-3">
                            <input 
                                className="flex-1 px-4 py-3 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-lg"
                                placeholder="Enter English word (e.g. Water)"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleAddWord()}
                            />
                            <button 
                                onClick={handleAddWord}
                                disabled={loading}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition-all disabled:opacity-50"
                            >
                                {loading ? '...' : 'Add'}
                            </button>
                        </div>
                        {error && (
                            <div className="mt-3 p-3 bg-red-50 border border-red-100 rounded-lg">
                                <p className="text-red-500 text-sm font-medium">⚠️ {error}</p>
                                <p className="text-red-400 text-xs mt-1">Tip: Check if 'Generative Language API' is enabled in your Google AI Studio settings.</p>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 gap-4">
                        {words.map(word => (
                            <div key={word.id} className="bg-white border border-slate-100 p-4 rounded-2xl flex items-center gap-5 shadow-sm hover:shadow-md transition-all group">
                                <img src={word.img} className="w-20 h-20 rounded-xl object-cover bg-slate-100" />
                                <div className="flex-1">
                                    <div className="flex items-baseline gap-2">
                                        <h2 className="text-2xl font-bold text-slate-800">{word.zh}</h2>
                                        <span className="text-blue-500 font-medium">{word.py}</span>
                                    </div>
                                    <p className="text-slate-400 uppercase text-xs tracking-widest font-bold">{word.en}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => playAudio(word.zh)}
                                        className="p-3 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-600 hover:text-white transition-colors"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                                    </button>
                                    <button 
                                        onClick={() => deleteWord(word.id)}
                                        className="p-3 bg-slate-50 text-slate-400 rounded-full hover:bg-red-100 hover:text-red-600 transition-colors opacity-0 group-hover:opacity-100"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
